services:
  skeleton-app:
    depends_on:
      - fast-api-server
    image: node:24.15.0-slim
    ports:
      - 5173:5173
    working_dir: /app
    environment:
      VITE_API_BASE_URL: "http://fast-api-server:8000"
    volumes:
      - ./apps/skeleton-app:/app
      - skeleton-app-node-modules:/app/node_modules
    command: /bin/sh -c "npm install && npm run dev"
  
  fast-api-server:
    build:
      context: ./apps/fast-api-server
      target: development
      args:
        PYTHON_VERSION: 3.13.2
    ports:
      - 8000:8000
    environment:
      # ローカル開発専用: シークレットをベタ書き（本番は wrangler secret put で設定）
      APP_SECRET: "local-dev-secret"
      AI_GATEWAY_BASE_URL: "https://gateway.ai.cloudflare.com/v1/{account_id}/{gateway_id}"
      AI_GATEWAY_TOKEN: "your-ai-gateway-token"
      # CORS: ローカルのフロントエンド開発サーバーを許可
      ALLOWED_ORIGINS: '["http://localhost:5173"]'
      # 各プロバイダーのモデル名（wrangler.toml の [vars] と揃える）
      GEMINI_MODEL: "gemini-1.5-flash"
      CLAUDE_MODEL: "claude-3-5-haiku-20241022"
      GROQ_MODEL: "llama-3.3-70b-versatile"
    volumes:
      - ./apps/fast-api-server:/app
      - fast-api-server-venv:/app/.venv
    command:
      ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--log-config", "src/logging.ini", "--reload"]
    tty: true

volumes:
  skeleton-app-node-modules:
  fast-api-server-venv:
