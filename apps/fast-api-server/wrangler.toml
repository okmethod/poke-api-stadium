name = "fast-api-server"
main = "src/main.py"
compatibility_date = "2024-12-01"
compatibility_flags = ["python_workers"]

[vars]
# 非秘匿の環境変数（公開してよい値のみ記載）
# 各プロバイダーのデフォルトモデル名（必要に応じて上書きする）
GEMINI_MODEL = "gemini-1.5-flash"
CLAUDE_MODEL = "claude-3-5-haiku-20241022"
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGINS = "https://okmethod.github.io"

# 秘匿情報は wrangler secret put コマンドで設定する（このファイルには書かない）
# wrangler secret put APP_SECRET
# wrangler secret put AI_GATEWAY_BASE_URL  -- Cloudflare AI Gateway のベース URL
# wrangler secret put AI_GATEWAY_TOKEN     -- Cloudflare AI Gateway が払い出した認証トークン
